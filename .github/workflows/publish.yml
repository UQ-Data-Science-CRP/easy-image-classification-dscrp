name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render presentation
        run: quarto render presentation/image-classification-masterclass.qmd

      - name: Prepare site
        run: |
          mkdir _site
          touch _site/.nojekyll
          cp presentation/image-classification-masterclass.html _site/
          cp -r presentation/assets _site/
          # Copy reveal.js and other JS/CSS dependencies generated by Quarto
          if [ -d "presentation/image-classification-masterclass_files" ]; then
            cp -r presentation/image-classification-masterclass_files _site/
          fi
          printf '<!DOCTYPE html>\n<meta charset="utf-8">\n<meta http-equiv="refresh" content="0; URL=image-classification-masterclass.html">\n' > _site/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
